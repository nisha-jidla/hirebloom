<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Coach - HireBloom</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Segoe UI',sans-serif;
background:#f5f0ff;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
font-size:24px;
font-weight:700;
color:#6c3fc5;
text-decoration:none;
}

.logo span{color:#f59e0b}

.home-btn{
background:#6c3fc5;
color:white;
padding:10px 22px;
border-radius:25px;
text-decoration:none;
font-weight:600;
}

.container{
max-width:900px;
margin:50px auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#6c3fc5;
margin-bottom:25px;
}

input,select{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#6c3fc5;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
font-size:17px;
font-weight:600;
margin-top:15px;
}

.result{
margin-top:25px;
padding:22px;
background:#f9f6ff;
border-radius:12px;
line-height:1.8;
display:none;
}
</style>
</head>

<body>

<nav>
<a href="index.html" class="logo">Hire<span>Bloom</span> 🌸</a>
<a href="index.html" class="home-btn">← Home</a>
</nav>

<div class="container">
<h1>🎤 AI Interview Coach</h1>

<input type="text" id="role" placeholder="Enter Job Role">

<select id="level">
<option value="Beginner">Beginner</option>
<option value="Intermediate">Intermediate</option>
<option value="Experienced">Experienced</option>
</select>

<button onclick="generateQuestions()">Generate Interview Questions</button>

<div class="result" id="result"></div>
</div>

<script>
function generateQuestions(){
const role = document.getElementById("role").value.trim();
const level = document.getElementById("level").value;

if(role === ""){
alert("Please enter a Job Role");
return;
}

const questions = `
<h3>Interview Questions for ${role} (${level})</h3>
<ol>
<li>Tell me about yourself.</li>
<li>Why do you want this role?</li>
<li>What are your strengths?</li>
<li>What are your weaknesses?</li>
<li>Describe a challenging situation.</li>
<li>How do you handle pressure?</li>
<li>What experience do you have?</li>
<li>Why should we hire you?</li>
<li>Where do you see yourself in 5 years?</li>
<li>Do you have any questions for us?</li>
</ol>
`;

const result = document.getElementById("result");
result.innerHTML = questions;
result.style.display = "block";
}
</script>

</body>
</html>
