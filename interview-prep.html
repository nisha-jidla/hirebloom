<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep - HireBloom</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f5f0ff;color:#1a1a2e}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:white;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.logo{font-size:24px;font-weight:700;color:#6c3fc5;text-decoration:none}
.logo span{color:#f59e0b}
.home-btn{background:#6c3fc5;color:white;padding:10px 22px;border-radius:25px;text-decoration:none;font-weight:600}
.container{max-width:900px;margin:50px auto;padding:0 20px}
h1{text-align:center;font-size:36px;margin-bottom:10px}
.subtitle{text-align:center;color:#666;margin-bottom:35px}
.card{background:white;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:25px}
label{display:block;font-weight:600;margin-bottom:8px}
input,select{width:100%;padding:13px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;margin-bottom:20px}
input:focus,select:focus{border-color:#6c3fc5}
.btn{width:100%;padding:15px;border:none;border-radius:30px;background:#6c3fc5;color:white;font-size:17px;font-weight:700;cursor:pointer}
.btn:disabled{background:#999;cursor:not-allowed}
.loading{display:none;text-align:center;color:#6c3fc5;font-weight:600;padding:20px}
.error{display:none;background:#fff0f0;border:2px solid #fecaca;color:#b91c1c;padding:16px;border-radius:10px;margin-top:18px}
.result{display:none}
.question-card{background:#f9f6ff;padding:20px;border-radius:14px;margin-bottom:16px}
.question-type{display:inline-block;background:#ede9fe;color:#5b21b6;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:capitalize;margin-bottom:10px}
.question-card h3{font-size:18px;line-height:1.5;margin-bottom:12px}
.tip{background:#fff7ed;border-left:4px solid #f59e0b;padding:12px;border-radius:8px;color:#555;line-height:1.6}
.save-btn{margin-top:10px;background:#f59e0b}
@media(max-width:700px){nav{padding:20px;flex-direction:column;gap:15px}h1{font-size:30px}}
</style>
</head>

<body>

<nav>
<a href="index.html" class="logo">Hire<span>Bloom</span> 🌸</a>
<a href="index.html" class="home-btn">← Home</a>
</nav>

<div class="container">

<h1>🎤 Interview Prep</h1>
<p class="subtitle">Get AI-generated interview questions specific to your job role.</p>

<div class="card">

<label>Job Role</label>
<input id="role" placeholder="Example: Software Tester">

<label>Experience Level</label>
<select id="level">
<option value="Beginner">Beginner</option>
<option value="Junior">Junior (1-2 years)</option>
<option value="Mid-level">Mid-level (3-5 years)</option>
<option value="Senior">Senior (5+ years)</option>
</select>

<label>Number of Questions</label>
<select id="count">
<option value="5">5 questions</option>
<option value="8">8 questions</option>
<option value="10">10 questions</option>
</select>

<button class="btn" id="generateBtn" onclick="generateQuestions()">🎯 Generate Interview Questions</button>

<div class="error" id="errorBox"></div>
</div>

<div class="loading" id="loading">⏳ Generating interview questions...</div>

<div class="card result" id="result">
<h2 style="margin-bottom:20px;">Your Interview Questions</h2>
<div id="questionsList"></div>
<button class="btn save-btn" onclick="saveSession()">💾 Save Interview Session</button>
</div>

</div>

<script>
let latestQuestions=[];

function normaliseQuestion(item,index){
if(typeof item==="string"){
return {
type:"general",
question:item,
tip:"Prepare a clear example and structure your answer using the STAR method where appropriate."
};
}

return {
type:item.type || item.category || "general",
question:item.question || item.text || item.prompt || `Question ${index+1}`,
tip:item.tip || item.guidance || item.answerTip || item.answer_tip || "Explain your thinking clearly and support your answer with a relevant example."
};
}

function extractQuestions(data){
if(Array.isArray(data)){
return data.map(normaliseQuestion);
}

if(Array.isArray(data.questions)){
return data.questions.map(normaliseQuestion);
}

if(Array.isArray(data.interviewQuestions)){
return data.interviewQuestions.map(normaliseQuestion);
}

if(Array.isArray(data.content)){
const textBlocks=data.content
.filter(block=>block && block.type==="text" && block.text)
.map(block=>block.text);

if(textBlocks.length){
try{
const parsed=JSON.parse(textBlocks.join("\n"));
if(Array.isArray(parsed)){
return parsed.map(normaliseQuestion);
}
if(Array.isArray(parsed.questions)){
return parsed.questions.map(normaliseQuestion);
}
}catch(error){
return textBlocks.map(normaliseQuestion);
}
}
}

if(data.raw && Array.isArray(data.raw.content)){
const text=data.raw.content
.filter(block=>block && block.type==="text" && block.text)
.map(block=>block.text)
.join("\n");

try{
const parsed=JSON.parse(text);
if(Array.isArray(parsed)){
return parsed.map(normaliseQuestion);
}
if(Array.isArray(parsed.questions)){
return parsed.questions.map(normaliseQuestion);
}
}catch(error){
if(text){
return text
.split(/\n(?=(?:Q?\d+[\).]|behavioral|technical|situational))/i)
.filter(Boolean)
.map(normaliseQuestion);
}
}
}

return [];
}

async function generateQuestions(){
const role=document.getElementById("role").value.trim();
const level=document.getElementById("level").value;
const count=Number(document.getElementById("count").value);
const btn=document.getElementById("generateBtn");
const errorBox=document.getElementById("errorBox");

errorBox.style.display="none";
document.getElementById("result").style.display="none";

if(!role){
alert("Please enter a job role.");
return;
}

btn.disabled=true;
btn.textContent="⏳ Generating...";
document.getElementById("loading").style.display="block";

try{
const response=await fetch("/.netlify/functions/interview",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
role,
jobRole:role,
level,
experienceLevel:level,
count,
numberOfQuestions:count
})
});

let data={};

try{
data=await response.json();
}catch(error){
throw new Error("The interview function returned an invalid response.");
}

if(!response.ok){
throw new Error(data.error || "Interview question generation failed.");
}

latestQuestions=extractQuestions(data);

if(latestQuestions.length===0){
throw new Error("No interview questions were returned.");
}

renderQuestions();

}catch(error){
errorBox.textContent="❌ Error: "+error.message;
errorBox.style.display="block";
}finally{
document.getElementById("loading").style.display="none";
btn.disabled=false;
btn.textContent="🎯 Generate Interview Questions";
}
}

function renderQuestions(){
const list=document.getElementById("questionsList");

list.innerHTML=latestQuestions.map((item,index)=>`
<div class="question-card">
<span class="question-type">${item.type}</span>
<h3>Q${index+1}. ${item.question}</h3>
<div class="tip">💡 ${item.tip}</div>
</div>
`).join("");

document.getElementById("result").style.display="block";
}

function saveSession(){
if(latestQuestions.length===0){
alert("Generate questions first.");
return;
}

const role=document.getElementById("role").value.trim();
const level=document.getElementById("level").value;

let sessions=JSON.parse(localStorage.getItem("hirebloomInterviewSessions")) || [];

const content=latestQuestions.map((item,index)=>
`Q${index+1}. ${item.question}\nTip: ${item.tip}`
).join("\n\n");

sessions.push({
role,
level,
date:new Date().toLocaleString(),
content,
questions:latestQuestions
});

localStorage.setItem("hirebloomInterviewSessions",JSON.stringify(sessions));

alert("Interview session saved to Dashboard.");
}
</script>

</body>
</html>
