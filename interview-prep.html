<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep - HireBloom</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f5f0ff}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:white;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.logo{font-size:24px;font-weight:700;color:#6c3fc5;text-decoration:none}
.logo span{color:#f59e0b}
.home-btn{background:#6c3fc5;color:white;padding:10px 22px;border-radius:25px;text-decoration:none;font-weight:600}
.container{max-width:800px;margin:50px auto;padding:0 20px}
h1{text-align:center;font-size:36px;color:#1a1a2e;margin-bottom:10px}
.subtitle{text-align:center;color:#666;margin-bottom:40px}
.card{background:white;border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:24px}
label{display:block;font-weight:600;color:#1a1a2e;margin-bottom:8px}
input,select{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;outline:none}
input:focus,select:focus{border-color:#6c3fc5}
.btn{width:100%;padding:16px;background:#6c3fc5;color:white;border:none;border-radius:30px;font-size:18px;font-weight:600;cursor:pointer;margin-top:24px}
.btn:hover{background:#5630a3}
.btn:disabled{background:#999;cursor:not-allowed}
.loading{display:none;text-align:center;padding:30px;color:#6c3fc5;font-size:18px}
.error{display:none;background:#fff0f0;border:2px solid #ffcccc;border-radius:10px;padding:20px;color:#cc0000;margin-top:20px}
.results{display:none}
.question-card{background:white;border-radius:14px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:16px;border-left:5px solid #6c3fc5}
.question-card h3{color:#6c3fc5;font-size:16px;margin-bottom:10px}
.question-card p{color:#1a1a2e;font-size:15px;font-weight:600;margin-bottom:10px}
.tip{background:#f9f6ff;padding:12px;border-radius:8px;color:#555;font-size:14px;line-height:1.6}
.tip strong{color:#6c3fc5}
</style>
</head>
<body>

<nav>
<a href="index.html" class="logo">Hire<span>Bloom</span> 🌸</a>
<a href="index.html" class="home-btn">← Home</a>
</nav>

<div class="container">
<h1>🎤 Interview Prep</h1>
<p class="subtitle">Get AI-generated interview questions specific to your job role!</p>

<div class="card">
  <label>Job Role</label>
  <input id="jobRole" placeholder="Example: ServiceNow Developer, IT Support Analyst, DevOps Engineer">

  <label style="margin-top:18px">Experience Level</label>
  <select id="level">
    <option value="entry level">Entry Level / Graduate</option>
    <option value="junior">Junior (1-2 years)</option>
    <option value="mid level">Mid Level (3-5 years)</option>
    <option value="senior">Senior (5+ years)</option>
  </select>

  <button class="btn" id="generateBtn" onclick="generateQuestions()">🎯 Generate Interview Questions</button>
</div>

<div class="loading" id="loading">⏳ AI is generating your questions... please wait!</div>
<div class="error" id="errorBox"></div>
<div class="results" id="results"></div>
</div>

<script>
async function generateQuestions() {
  const jobRole = document.getElementById('jobRole').value.trim();
  const level = document.getElementById('level').value;
  const btn = document.getElementById('generateBtn');
  const errorBox = document.getElementById('errorBox');

  errorBox.style.display = 'none';

  if (!jobRole) {
    alert('Please enter a job role!');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Generating...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';

  try {
    const response = await fetch('/.netlify/functions/interview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobRole, level })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error);

    const text = data.content[0].text;
    const resultsDiv = document.getElementById('results');

    const questions = text.split(/Q\d+:/).filter(q => q.trim());

    questions.forEach((q, i) => {
      const parts = q.split('Tip:');
      const question = parts[0].trim();
      const tip = parts[1] ? parts[1].trim() : '';

      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <h3>Question ${i + 1}</h3>
        <p>${question}</p>
        ${tip ? `<div class="tip"><strong>💡 Tip:</strong> ${tip}</div>` : ''}
      `;
      resultsDiv.appendChild(card);
    });

    resultsDiv.style.display = 'block';

  } catch (error) {
    errorBox.textContent = '❌ Error: ' + error.message;
    errorBox.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
    btn.textContent = '🎯 Generate Interview Questions';
  }
}
</script>

</body>
</html>
