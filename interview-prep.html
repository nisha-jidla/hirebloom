<script>
async function generateQuestions() {

    const role = document.getElementById("jobrole").value.trim();
    const result = document.getElementById("result");

    if (role === "") {
        alert("Please enter a job role.");
        return;
    }

    result.style.display = "block";
    result.innerHTML = "<h3>Generating interview questions...</h3>";

    try {

        const response = await fetch("/.netlify/functions/interview", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                jobRole: role
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Failed to generate questions");
        }

        let questionsHtml = `<h3>Interview Questions for ${role}</h3>`;

        if (data.questions && data.questions.length > 0) {

            data.questions.forEach((item, index) => {

                if (typeof item === "object") {

                    questionsHtml += `
                        <p>
                        <strong>${index + 1}. ${item.question}</strong><br>
                        <em>Tip:</em> ${item.tip || ""}
                        </p>
                    `;

                } else {

                    questionsHtml += `
                        <p>
                        <strong>${index + 1}. ${item}</strong>
                        </p>
                    `;
                }

            });

        } else {

            questionsHtml += `
                <p>No interview questions returned.</p>
            `;
        }

        result.innerHTML = questionsHtml;

    } catch (error) {

        console.error(error);

        result.innerHTML = `
            <h3>Error</h3>
            <p>${error.message}</p>
        `;
    }
}
</script>
